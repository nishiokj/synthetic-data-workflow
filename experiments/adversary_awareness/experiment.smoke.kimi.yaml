version: "0.3"
experiment:
  id: synth_generator_adversary_awareness_kimi
  name: Synth Generator Adversary Awareness (Kimi smoke)
  workload_type: agent_runtime
  description: Smoke variant of adversary awareness using Kimi (DeepInfra) for both the generator and the gate ensemble.
  owner: synth-data-pipeline

dataset:
  suite_id: synth_generation_envelopes_v1
  provider: local_jsonl
  path: ./tasks.jsonl
  schema_version: task_row_v2
  split_id: eval
  limit: 3

design:
  comparison: paired
  replications: 1
  random_seed: 42
  shuffle_tasks: true
  max_concurrency: 2

baseline:
  variant_id: generator_minimal
  bindings:
    model_provider: openai
    model: moonshotai/Kimi-K2.6
    model_base_url: https://api.deepinfra.com/v1/openai
    reasoning: ""
    gate_ensemble_1_provider: openai
    gate_ensemble_1_model: moonshotai/Kimi-K2.6
    gate_ensemble_1_base_url: https://api.deepinfra.com/v1/openai
    generator_system_prompt_override: &minimal_generator_prompt >
      You are a benchmark case generator. Return JSON only.

      Implement the provided generation_envelope faithfully. Use the design brief
      to create one concrete benchmark candidate for the requested target ability,
      environment, runtime requirements, workspace shape, and test command.

      Put all evaluated-agent-visible material in agent_artifact. Put evaluator-only
      answers, scoring metadata, expected behavior, known limits, and negative
      controls in judge_artifact.

      Do not reveal judge-only answers, intended fixes, causal diagnoses, hidden
      expectations, or scoring answers in agent_artifact, visible files, prompts,
      comments, test names, fixture names, README text, or visible outputs.

      Respect runtime_requirements and the required_json_schema.
    generator_system_prompt_append: ""

variant_plan:
  - variant_id: generator_minimal_adversary
    bindings:
      model_provider: openai
      model: moonshotai/Kimi-K2.6
      model_base_url: https://api.deepinfra.com/v1/openai
      reasoning: ""
      gate_ensemble_1_provider: openai
      gate_ensemble_1_model: moonshotai/Kimi-K2.6
      gate_ensemble_1_base_url: https://api.deepinfra.com/v1/openai
      generator_system_prompt_override: *minimal_generator_prompt
      generator_system_prompt_append: >
        After generation, this candidate will be adversarially graded for quality.
  - variant_id: generator_minimal_rubric
    bindings:
      model_provider: openai
      model: moonshotai/Kimi-K2.6
      model_base_url: https://api.deepinfra.com/v1/openai
      reasoning: ""
      gate_ensemble_1_provider: openai
      gate_ensemble_1_model: moonshotai/Kimi-K2.6
      gate_ensemble_1_base_url: https://api.deepinfra.com/v1/openai
      generator_system_prompt_override: *minimal_generator_prompt
      generator_system_prompt_append: >
        {{DOMAIN_RUBRIC_CONTEXT}}
  - variant_id: generator_minimal_rubric_adversary
    bindings:
      model_provider: openai
      model: moonshotai/Kimi-K2.6
      model_base_url: https://api.deepinfra.com/v1/openai
      reasoning: ""
      gate_ensemble_1_provider: openai
      gate_ensemble_1_model: moonshotai/Kimi-K2.6
      gate_ensemble_1_base_url: https://api.deepinfra.com/v1/openai
      generator_system_prompt_override: *minimal_generator_prompt
      generator_system_prompt_append: >
        After generation, this candidate will be adversarially graded for quality.

        {{DOMAIN_RUBRIC_CONTEXT}}

trial_runtime:
  task:
    interface: writable_workspace
    workspace:
      source: container_image
      image:
        from: task_row
      workdir:
        from: task_row
  agent:
    image: synth-pipeline-agent:local
    command:
      - python
      - /opt/agent/agentlab_entrypoint.py
      - --domain
      - /opt/agent/domains/benchmark_code_debug.yaml
      - --workspace-validation-executor
      - local
    env:
      MODEL_PROVIDER: "$model_provider"
      MODEL_NAME: "$model"
      MODEL_BASE_URL: "$model_base_url"
      MODEL_API_KEY: "$GATE_ENSEMBLE_1_API_KEY"
      MODEL_REASONING_EFFORT: "$reasoning"
      MODEL_TIMEOUT_SECONDS: "600"
      GENERATOR_SYSTEM_PROMPT_OVERRIDE: "$generator_system_prompt_override"
      GENERATOR_SYSTEM_PROMPT_APPEND: "$generator_system_prompt_append"
      GATE_ENSEMBLE_1_PROVIDER: "$gate_ensemble_1_provider"
      GATE_ENSEMBLE_1_MODEL: "$gate_ensemble_1_model"
      GATE_ENSEMBLE_1_BASE_URL: "$gate_ensemble_1_base_url"
      GATE_ENSEMBLE_1_API_KEY: "$GATE_ENSEMBLE_1_API_KEY"
      EMBEDDING_PROVIDER: local
    output_mounts:
      - id: session_context
        kind: directory
        path: synth-pipeline
        env: AGENTLAB_SESSION_CONTEXT_ROOT
        persist: true
    outputs:
      result:
        capture:
          type: file
          path: /agentlab/out/result.json
          format: json
          required: true
    integration_level: cli_basic
    network: full
  execution:
    agent_site: agent_container
  grader:
    strategy: none

metrics:
  - id: committed
    label: Committed
    value_type: number
    direction: maximize
    primary: true
    required: true
    source:
      type: agent_response
      pointer: /metrics/committed
  - id: dropped
    value_type: number
    direction: minimize
    source:
      type: agent_response
      pointer: /metrics/dropped
  - id: final_status
    value_type: string
    source:
      type: agent_response
      pointer: /metrics/final_status
  - id: final_route_code
    value_type: string
    source:
      type: agent_response
      pointer: /metrics/final_route_code
  - id: final_subcodes
    value_type: array
    source:
      type: agent_response
      pointer: /metrics/final_subcodes
  - id: generation_attempts
    value_type: number
    direction: minimize
    source:
      type: agent_response
      pointer: /metrics/generation_attempts
  - id: input_tokens_total
    value_type: number
    unit: tokens
    direction: minimize
    source:
      type: agent_response
      pointer: /metrics/input_tokens_total
  - id: output_tokens_total
    value_type: number
    unit: tokens
    direction: minimize
    source:
      type: agent_response
      pointer: /metrics/output_tokens_total
  - id: latency_ms_total
    value_type: number
    unit: ms
    direction: minimize
    source:
      type: agent_response
      pointer: /metrics/latency_ms_total
  - id: cost_usd_total
    value_type: number
    unit: usd
    direction: minimize
    source:
      type: agent_response
      pointer: /metrics/cost_usd_total

policy:
  timeout_ms: 1800000
  task_sandbox:
    network: full

artifacts:
  collect:
    - synth-pipeline/**
  diff: false

validity:
  fail_on_state_leak: true
  fail_on_profile_invariant_violation: true
